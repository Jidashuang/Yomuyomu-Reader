<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YomuYomu Ops</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="ops-body">
    <main class="ops-shell">
      <section class="card">
        <div class="ops-head">
          <div>
            <p class="eyebrow">Admin / Ops</p>
            <h1>每日运营指标</h1>
          </div>
          <div class="ops-controls">
            <input id="opsTokenInput" class="user-input" type="password" placeholder="Admin Token" />
            <input id="opsDaysInput" class="user-input narrow" type="number" min="1" max="90" value="14" />
            <button id="opsRefreshBtn">刷新</button>
          </div>
        </div>
        <p id="opsStatus" class="meta">等待加载...</p>
        <div class="ops-table-wrap">
          <table class="metrics-table">
            <thead>
              <tr>
                <th>日期</th>
                <th>sample 打开</th>
                <th>点词数</th>
                <th>explain 请求</th>
                <th>缓存命中率</th>
                <th>import 成功率</th>
                <th>job requeue</th>
                <th>sync 失败率</th>
                <th>升级点击</th>
                <th>付费成功</th>
              </tr>
            </thead>
            <tbody id="opsTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script type="module" src="ops.js"></script>
  </body>
</html>
